type Airport @model @auth(rules: [{allow: private}])
{
  iataCode: String!
  name: String!
  city: String!
  country: String!
  originFlights: [Flight] @hasMany(references: ["originAirportId"])
  destinationFlights: [Flight] @hasMany(references: ["destinationAirportId"])
}

type Flight @model @auth(rules: [{allow: private}])
{
  flightNumber: String!
  airline: String!
  scheduledAt: AWSDateTime!
  gate: String
  originAirportId: ID!
  destinationAirportId: ID!
  originAirport: Airport @belongsTo(references: ["originAirportId"])
  destinationAirport: Airport @belongsTo(references: ["destinationAirportId"])
  status: FlightStatus
}

enum FlightStatus {
  SCHEDULED
  BOARDING
  DEPARTED
  ARRIVED
  CANCELLED
  DELAYED
}